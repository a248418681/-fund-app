name: fund_app
description: 基金管理应用 - Flutter重构版
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # 状态管理
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  get_it: ^7.6.4
  
  # 网络
  dio: ^5.4.0
  http: ^1.1.0
  connectivity_plus: ^5.0.2
  retrofit: ^4.0.3
  web_socket_channel: ^2.4.0
  
  # 本地存储
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.1
  
  # UI组件
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  pull_to_refresh_flutter3: ^2.0.2
  fl_chart: ^0.66.0
  
  # 工具
  intl: ^0.19.0
  logger: ^2.0.2+1
  uuid: ^4.2.1
  url_launcher: ^6.2.2
  
  # 路由
  go_router: ^13.0.1
  gbk_codec: ^0.4.0
  image_picker: ^1.2.1
  google_mlkit_text_recognition: ^0.15.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  retrofit_generator: ^8.0.6
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
